# Build Windows release binary and publish a GitHub Release on every push to main.
name: Release (main, Windows exe)

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release (gvg_modding_tool)
        run: cargo build --release --locked --bin gvg_modding_tool

      - name: Upload artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: gvg_modding_tool-windows-x86_64
          path: target/release/gvg_modding_tool.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Unique tag per run so every push gets its own release.
          tag_name: main-build-${{ github.run_number }}-${{ github.run_id }}
          name: Main build ${{ github.run_number }} (${{ github.sha }})
          generate_release_notes: true
          files: target/release/gvg_modding_tool.exe
